<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suscripcion Cancelada | Curso de Programacion</title>
    <meta
      name="description"
      content="Cancelacion del proceso de suscripcion del Curso de Programacion."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="top">
      <nav class="site-header__nav" aria-label="Principal">
        <a class="site-header__brand" href="/#inicio">Curso de Programacion</a>
        <div class="site-header__links">
          <a href="/#inicio">Inicio</a>
          <a href="/#programa">Programa</a>
          <a href="/#precios">Precios</a>
        </div>
      </nav>
    </header>

    <main class="result-page">
      <section class="result-card" data-result-page="cancel">
        <p class="result-card__eyebrow">Suscripcion Cancelada</p>
        <h1>No se ha completado la activacion.</h1>
        <p class="result-card__copy">
          No pasa nada. Puedes volver a la landing, cambiar de plan y relanzar el
          proceso cuando quieras.
        </p>

        <div class="result-card__actions">
          <a class="result-card__action result-card__action--primary" href="/#checkout">
            Volver a la suscripcion
          </a>
          <a
            class="result-card__action result-card__action--secondary"
            href="/#precios"
          >
            Revisar precios
          </a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
